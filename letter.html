<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
}

.heart {
    position: absolute;
    font-size: 22px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-900px); opacity: 0; }
}

.letter-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 90%;
    max-width: 420px;
    height: 80vh;
    padding: 20px;
    border-radius: 20px;
    background-image: url("photo/us11.jpeg");
    background-size: cover;
    background-position: center;
    animation: popup 1s forwards;
    overflow: hidden;   /* 🔥 IMPORTANT */
}

.letter-box::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.53);
    backdrop-filter: blur(3px);
    border-radius: 20px;
    z-index: 0;
}

@keyframes popup {
    to { transform: translate(-50%, -50%) scale(1); }
}

#typing {
    position: relative;
    z-index: 1;
    color: #000;
    font-size: 16px;
    line-height: 26px;
    text-align: center;
    font-weight: bold;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
}

#replayBtn {
    margin-top: 20px;
    padding: 10px 22px;
    border: none;
    border-radius: 20px;
    background: #ff4081;
    color: white;
    font-size: 14px;
    cursor: pointer;
    z-index: 1;
    position: relative;
}
.text-area {
    position: relative;
    z-index: 1;
    height: calc(80vh - 90px); /* leaves space for button */
    overflow-y: auto;
    scroll-behavior: smooth;
    padding-right: 5px;
}
#nextBtn {
    margin-top: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    background: #ff4081;
    color: white;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

/* hide scrollbar but keep scroll */
.text-area::-webkit-scrollbar {
    width: 0;
}
@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>

<body>

<audio id="bgMusic" autoplay></audio>

<div class="letter-box">
    <div class="text-area">
        <div id="typing"></div>
    </div>

    <button id="nextBtn" onclick="start()">
        Last idond nodu💖

</div>
<script>
function heart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💋";
    h.style.left = Math.random() * window.innerWidth + "px";
    h.style.bottom = "0";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
}
setInterval(heart, 300);
</script>

const box = document.getElementById("typing");

const CHAR_SPEED = 80;
const LINE_PAUSE = 30;

function type() {
    const scrollBox = document.querySelector(".text-area");

    if (i < lines.length) {
        if (j < lines[i].length) {
            box.innerHTML += lines[i][j++];
            scrollBox.scrollTop = scrollBox.scrollHeight;
            setTimeout(type, CHAR_SPEED);
        } else {
            box.innerHTML += "<br>";
            i++; j = 0;

            setTimeout(type, LINE_PAUSE);

<script>
const songs = [
    "koralige.mp3",
    "mukhavirisi.mp3",
    "sanihave.mp3",
    "nee beku.mp3",
    "nayakane.mp3",
    "bandante.mp3",
    "sihi irali.mp3",
    "song1.mp3"
];

let currentSong = 0;

// 🔥 Preload all songs
const audioList = songs.map(src => {
    const audio = new Audio(src);
    audio.preload = "auto";
    return audio;
});

// play first song
audioList[currentSong].play();

// when song ends → instantly play next
audioList.forEach((audio, index) => {
    audio.addEventListener("ended", () => {
        currentSong = (index + 1) % audioList.length;
        audioList[currentSong].currentTime = 0;
        audioList[currentSong].play();
    });
});
function start() {
    document.body.style.opacity = "0";
    setTimeout(() => {
        window.location.href = "bg.html"; // or next page
    }, 800);
}
</script>
