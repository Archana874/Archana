<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

 body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

/* 💖 Card */
.card {
    width: 100%;
    height: 90vh;
    border-radius: 25px;
    background-image: url("photo/ussssssss.jpeg");

    background-size: cover;        /* 🔥 important */
    background-position: center;   /* 🔥 important */
    background-repeat: no-repeat;  /* 🔥 important */

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    padding: 25px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: romanticMove 10s ease-in-out infinite alternate;
}
@keyframes romanticMove {
    from {
        background-position: center 60%;
        background-size: 110%;
    }
    to {
        background-position: center 30%;
        background-size: 120%;
    }
}

/* Optional heading */
.card h2 {
    margin-bottom: 20px;
}
.card h1 {
    color: white;
    font-size: 20px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<audio autoplay loop>
    <source src="myvoice.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>Huccha this is for uhhhhhhhhhhhhhhhhhhh🤗</h1>
</div>

</body>
</html>
